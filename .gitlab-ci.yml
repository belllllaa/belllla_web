# GitLab Pages 部署配置
# 部署后访问: https://bellllla.gitlab.io/belllla_web/

stages:
  - deploy

pages:
  stage: deploy
  image: alpine:latest
  script:
    - ls -la
    - mkdir -p public
    - cp github-top-stars.html public/index.html
    - ls -la public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

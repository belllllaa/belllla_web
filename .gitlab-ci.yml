# GitLab Pages 部署配置
# 部署后访问: https://bellllla.gitlab.io/belllla_web/

stages:
  - deploy

pages:
  stage: deploy
  image: alpine:latest
  script:
    - ls -la
    - mkdir -p public
    - |
      {
        echo -n '<p style="color:#8b949e;font-size:13px;margin:0 0 1rem 0">GitLab Pages · pipeline '"$CI_PIPELINE_ID"' · '
        date -u +%Y-%m-%dT%H:%M:%SZ | tr -d '\n'
        echo ' (UTC)</p>'
        cat github-top-stars.html
      } > public/index.html
    - ls -la public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
